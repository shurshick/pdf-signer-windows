name: Build Windows

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build
        run: msbuild src\PdfSignerWindows\PdfSignerWindows.csproj /restore /p:Configuration=Release

      - name: Prepare artifacts
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          if ($version.StartsWith("v")) { $version = $version.Substring(1) }
          if (-not $version -or $version -eq "main") { $version = "0.1.0-ci" }

          New-Item -ItemType Directory -Force -Path artifacts\portable | Out-Null
          Copy-Item -Path src\PdfSignerWindows\bin\Release\net48\* -Destination artifacts\portable -Recurse -Force
          Compress-Archive -Path artifacts\portable\* -DestinationPath "artifacts\pdf-signer-windows-$version-portable.zip" -Force
          "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Install NSIS
        run: choco install nsis -y --no-progress

      - name: Build installer
        run: makensis /DVERSION=${{ env.VERSION }} installer\nsis\pdf-signer-windows.nsi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pdf-signer-windows-${{ env.VERSION }}
          path: |
            artifacts\pdf-signer-windows-${{ env.VERSION }}-portable.zip
            artifacts\pdf-signer-windows-${{ env.VERSION }}-setup.exe

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts\pdf-signer-windows-${{ env.VERSION }}-portable.zip
            artifacts\pdf-signer-windows-${{ env.VERSION }}-setup.exe
          generate_release_notes: true
